<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-label="Lotus numerology chart">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff8e8"/>
      <stop offset="100%" stop-color="#fff2ce"/>
    </linearGradient>
    <radialGradient id="core" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#fff9ed"/>
      <stop offset="100%" stop-color="#f7dfaa"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="4" stdDeviation="7" flood-color="#cba45a" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="6" y="6" width="1188" height="688" rx="42" fill="url(#bg)" stroke="#d79f39" stroke-width="12"/>

  <!-- Outer lotus ring -->
  <g transform="translate(600 350)" filter="url(#shadow)" fill="#fff7e2" stroke="#d08e2e" stroke-width="4">
    <ellipse cx="0" cy="-250" rx="92" ry="170"/>
    <ellipse cx="125" cy="-216" rx="92" ry="170" transform="rotate(24)"/>
    <ellipse cx="210" cy="-130" rx="92" ry="170" transform="rotate(48)"/>
    <ellipse cx="250" cy="0" rx="92" ry="170" transform="rotate(72)"/>
    <ellipse cx="210" cy="130" rx="92" ry="170" transform="rotate(96)"/>
    <ellipse cx="125" cy="216" rx="92" ry="170" transform="rotate(120)"/>
    <ellipse cx="0" cy="250" rx="92" ry="170" transform="rotate(180)"/>
    <ellipse cx="-125" cy="216" rx="92" ry="170" transform="rotate(204)"/>
    <ellipse cx="-210" cy="130" rx="92" ry="170" transform="rotate(228)"/>
    <ellipse cx="-250" cy="0" rx="92" ry="170" transform="rotate(252)"/>
    <ellipse cx="-210" cy="-130" rx="92" ry="170" transform="rotate(276)"/>
    <ellipse cx="-125" cy="-216" rx="92" ry="170" transform="rotate(300)"/>
  </g>

  <!-- Inner lotus -->
  <g transform="translate(600 350)" fill="#fff3d4" stroke="#cf9235" stroke-width="3">
    <ellipse cx="0" cy="-165" rx="68" ry="122"/>
    <ellipse cx="82" cy="-143" rx="68" ry="122" transform="rotate(24)"/>
    <ellipse cx="142" cy="-82" rx="68" ry="122" transform="rotate(48)"/>
    <ellipse cx="165" cy="0" rx="68" ry="122" transform="rotate(72)"/>
    <ellipse cx="142" cy="82" rx="68" ry="122" transform="rotate(96)"/>
    <ellipse cx="82" cy="143" rx="68" ry="122" transform="rotate(120)"/>
    <ellipse cx="0" cy="165" rx="68" ry="122" transform="rotate(180)"/>
    <ellipse cx="-82" cy="143" rx="68" ry="122" transform="rotate(204)"/>
    <ellipse cx="-142" cy="82" rx="68" ry="122" transform="rotate(228)"/>
    <ellipse cx="-165" cy="0" rx="68" ry="122" transform="rotate(252)"/>
    <ellipse cx="-142" cy="-82" rx="68" ry="122" transform="rotate(276)"/>
    <ellipse cx="-82" cy="-143" rx="68" ry="122" transform="rotate(300)"/>
  </g>

  <!-- Core -->
  <circle cx="600" cy="350" r="102" fill="url(#core)" stroke="#cf9235" stroke-width="5"/>
  <circle cx="600" cy="350" r="72" fill="#fff7e2" stroke="#d9a44d" stroke-width="3"/>
  <text x="600" y="365" text-anchor="middle" font-family="Noto Sans, sans-serif" font-weight="700" font-size="48" fill="#a86a17">OM</text>

  <!-- Number ring -->
  <g font-family="Noto Sans, sans-serif" font-weight="700" font-size="32" fill="#b22a2a" text-anchor="middle">
    <text x="600" y="58">10</text>
    <text x="762" y="84">9</text>
    <text x="892" y="156">8</text>
    <text x="972" y="282">7</text>
    <text x="978" y="430">6</text>
    <text x="892" y="554">5</text>
    <text x="600" y="640">4</text>
    <text x="308" y="554">3</text>
    <text x="222" y="430">2</text>
    <text x="228" y="282">1</text>
    <text x="308" y="156">12</text>
    <text x="438" y="84">11</text>
  </g>
</svg>
